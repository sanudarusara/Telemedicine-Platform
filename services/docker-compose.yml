# ═══════════════════════════════════════════════════════════════════════════════
# Smart Healthcare Platform - Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
# Complete microservices setup with MongoDB, Kafka, and all services.
#
# Service → Database mapping (each service owns its own database):
#   auth-service      → auth-management
#   patient-service   → patient-management
#   audit-service     → audit-management
#
# All services share a single MongoDB instance (separate databases),
# Kafka cluster, and Docker bridge network.

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Infrastructure Services
  # ─────────────────────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: healthcare-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - healthcare-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: healthcare-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - healthcare-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: healthcare-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - healthcare-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: healthcare-api-gateway
    restart: unless-stopped
    ports:
      - "6000:5400"
    environment:
      NODE_ENV: production
      PORT: 5400
      # Gateway is stateless — no MongoDB or Kafka needed
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-gateway-secret-key-change-in-production}
      # Service URLs use Docker service names for internal network communication
      AUTH_SERVICE_URL: http://auth-service:5000
      PATIENT_SERVICE_URL: http://patient-service:5001
      AUDIT_SERVICE_URL: http://audit-service:5002
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
      APPOINTMENT_SERVICE_URL: ${APPOINTMENT_SERVICE_URL:-http://appointment-service:3001}
      DOCTOR_SERVICE_URL: ${DOCTOR_SERVICE_URL:-http://doctor-service:3003}
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5400/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthcare-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: healthcare-auth-service
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # auth-service owns the auth-management database
      MONGO_URI: mongodb://mongodb:27017/auth-management
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this}
      JWT_EXPIRES_IN: 7d
      KAFKA_BROKER: kafka:29092
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-gateway-secret-key-change-in-production}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthcare-network

  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: healthcare-doctor-service
    restart: unless-stopped
    expose:
      - "3003"
    ports:
      - "3004:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/doctor-service
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-gateway-secret-key-change-in-production}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthcare-network

  patient-service:
    build:
      context: .
      dockerfile: patient-management-service/Dockerfile
    container_name: healthcare-patient-service
    restart: unless-stopped
    expose:
      - "5001"
    ports:
      - "5001:5001"
    env_file:
    - patient-management-service/.env
    environment:
      NODE_ENV: production
      PORT: 5001
      # patient-service owns the patient-management database
      MONGO_URI: mongodb://mongodb:27017/patient-management
      KAFKA_BROKER: kafka:29092
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-gateway-secret-key-change-in-production}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthcare-network

  audit-service:
    build:
      context: .
      dockerfile: audit-management-service/Dockerfile
    container_name: healthcare-audit-service
    restart: unless-stopped
    expose:
      - "5002"
    environment:
      NODE_ENV: production
      PORT: 5002
      # audit-service owns the audit-management database
      MONGO_URI: mongodb://mongodb:27017/audit-management
      KAFKA_BROKER: kafka:29092
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-gateway-secret-key-change-in-production}
      PATIENT_SERVICE_URL: http://patient-service:5001
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthcare-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: healthcare-notification-service
    restart: unless-stopped
    expose:
      - "3003"
    ports:
      - "3003:3003"
    env_file:
      - notification-service/.env
    environment:
      NODE_ENV: production
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/notification-service
      KAFKA_BROKER: kafka:29092
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-gateway-secret-key-change-in-production}
      SERVICE_USER_ID: notification-service
      SERVICE_USER_NAME: notification service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthcare-network

  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    container_name: healthcare-appointment-service
    restart: unless-stopped
    expose:
      - "3001"
    ports:
      - "3001:3001"
    env_file:
      - appointment-service/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/appointment-management
      # Use API Gateway for calling other services
      PATIENT_SERVICE_URL: http://api-gateway:5400/api/patients
      DOCTOR_SERVICE_URL: http://auth-service:5000/api/auth/doctors
      NOTIFICATION_SERVICE_URL: http://api-gateway:5400/api/notifications
      KAFKA_BROKER: kafka:29092
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-gateway-secret-key-change-in-production}
      SERVICE_USER_ID: appointment-service
      SERVICE_USER_NAME: appointment service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthcare-network

# ═══════════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  mongodb-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  patient-uploads:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  healthcare-network:
    driver: bridge
