version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:6
    container_name: healthcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Appointment Service
  appointment-service:
    build: .
    container_name: appointment-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/appointment-service
      - PATIENT_SERVICE_URL=http://patient-service:5001
      - DOCTOR_SERVICE_URL=http://doctor-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3002
      - DOCKER_ENV=true
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  healthcare-network:
    driver: bridge
