version: "3.9"

services:
  doctor-service:
    build: ./services/doctor-service
    container_name: doctor-service
    ports:
      - "8081:8081"
    env_file:
      - ./services/doctor-service/.env
    restart: unless-stopped

  telemedicine-service:
    build: ./services/telemedicine-service
    container_name: telemedicine-service
    ports:
      - "5000:5000"
    env_file:
      - ./services/telemedicine-service/.env
    restart: unless-stopped

  client:
    build: ./client
    container_name: healthcare-client
    ports:
      - "8082:8082"
    env_file:
      - ./client/.env
    depends_on:
      - doctor-service
      - telemedicine-service
    restart: unless-stopped