services:

  # ── Audit Management Service ───────────────────────────────────────────────
  audit-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-management-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/audit_db
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: audit-management-service
      KAFKA_GROUP_ID: audit-service-group
      PATIENT_SERVICE_URL: http://patient-service:5001
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthcare-network

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: audit-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network


# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  mongo-data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  healthcare-network:
    driver: bridge
