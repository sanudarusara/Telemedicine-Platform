apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: healthcare-platform-appointment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: appointment-config
                  key: PORT
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-config
                  key: CLIENT_URL
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: appointment-secret
                  key: MONGO_URI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: healthcare-platform-appointment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: appointment-config
                  key: PORT
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-config
                  key: PATIENT_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-config
                  key: DOCTOR_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-config
                  key: NOTIFICATION_SERVICE_URL
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: appointment-secret
                  key: MONGO_URI
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: appointment-secret
                  key: INTERNAL_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
